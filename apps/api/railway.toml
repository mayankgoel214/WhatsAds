[build]
builder = "dockerfile"
dockerfilePath = "apps/api/Dockerfile"
# Build context is repo root so monorepo packages are reachable
buildCommand = ""

[deploy]
startCommand = "sh -c 'npx prisma migrate deploy --schema ./packages/db/prisma/schema.prisma && node apps/api/dist/index.js'"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[[deploy.region]]
region = "ap-south-1"   # Mumbai — closest to Indian users
